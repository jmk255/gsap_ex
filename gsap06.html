<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP Scroll Effect</title>

  <link href="https://webfontworld.github.io/NexonLv1Gothic/NexonLv1Gothic.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    a {
      color: #fff;
      text-decoration: none;
    }

    body {
      color: #fff;
      font-family: "NexonLv1Gothic";
      font-weight: 300;
      background-color: #333;
      overflow-x: hidden;
    }

    #parallax__title {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 1000;
    }

    #parallax__title h1 {
      font-size: 30px;
      border-bottom: 1px dashed #fff;
      margin-bottom: 10px;
      padding-bottom: 5px;
      font-weight: 400;
      display: inline-block;
    }

    #parallax__title p {
      font-size: 16px;
    }

    #parallax__title ul {
      margin-top: 10px;
    }

    #parallax__title li {
      display: inline;
    }

    #parallax__title li a {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px dashed #fff;
      display: inline-block;
      text-align: center;
      line-height: 20px;
      font-size: 12px;
    }

    #parallax__title li.active a {
      background: #fff;
      color: #000;
    }

    /* parallax__cont */
    .parallax__item {
      width: 100%;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .parallax__item__num {
      font-size: 5vw;
      position: absolute;
      right: 20px;
      bottom: 20px;
      font-family: "Lato";
      font-weight: 100;
      z-index: 100;
    }

    .parallax__item__imgWrap {
      width: 30%;
      padding-bottom: 18%;
      position: relative;
      overflow: hidden;
      border-radius: 10px;
    }

    .parallax__item__img {
      position: absolute;
      left: -5%;
      top: -5%;
      width: 110%;
      height: 110%;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      filter: saturate(0%);
      transition: all 1s;
    }

    .parallax__item__img:hover {
      filter: saturate(100%);
      transform: scale(1.025);
    }

    #section1 .parallax__item__img {
      background-image: url(img/images1.jpg);
    }

    #section2 .parallax__item__img {
      background-image: url(img/images2.jpg);
    }

    #section3 .parallax__item__img {
      background-image: url(img/images3.jpg);
    }

    #section4 .parallax__item__img {
      background-image: url(img/images4.jpg);
    }

    #section5 .parallax__item__img {
      background-image: url(img/images5.jpg);
    }

    #section6 .parallax__item__img {
      background-image: url(img/images6.jpg);
    }

    #section7 .parallax__item__img {
      background-image: url(img/images7.jpg);
    }

    #section8 .parallax__item__img {
      background-image: url(img/images8.jpg);
    }

    #section9 .parallax__item__img {
      background-image: url(img/images9.jpg);
    }

    /*원하는 가로 영역을 #horizontal로 감싸고 다음과 같이 셋팅을 합니다*/
    #parallax__cont {
      overflow: hidden;
    }

    #horizontal {
      display: flex;
      flex-wrap: nowrap;
      width: 500%;
      /*5개의 섹션을 작업할 것이기 때문에 500vw로 설정*/
    }

    #horizontal>section {
      width: 100%;
    }
  </style>
</head>

<body>
  <header id="parallax__title">
    <h1>GSAP Parallax Effect5</h1>
    <p>GSAP scrollTrigger - 가로 세로 효과</p>
    <ul>
      <li><a href="gsap01.html">1</a></li>
      <li><a href="gsap02.html">2</a></li>
      <li><a href="gsap03.html">3</a></li>
      <li><a href="gsap04.html">4</a></li>
      <li class="active"><a href="gsap05.html">5</a></li>
    </ul>
  </header>
  <!-- //parallax__title  -->

  <main id="parallax__cont">
    <section id="section1" class="parallax__item">
      <span class="parallax__item__num">01</span>
      <figure class="parallax__item__imgWrap">
        <div class="parallax__item__img"></div>
      </figure>
    </section>
    <!-- //section1 -->

    <section id="section2" class="parallax__item">
      <span class="parallax__item__num">02</span>
      <figure class="parallax__item__imgWrap">
        <div class="parallax__item__img"></div>
      </figure>
    </section>
    <!-- //section2 -->
    <main id="horizontal">
      <section id="section3" class="parallax__item">
        <span class="parallax__item__num">03</span>
        <figure class="parallax__item__imgWrap">
          <div class="parallax__item__img"></div>
        </figure>
      </section>
      <!-- //section3 -->

      <section id="section4" class="parallax__item img4">
        <span class="parallax__item__num">04</span>
        <figure class="parallax__item__imgWrap">
          <div class="parallax__item__img"></div>
        </figure>
      </section>
      <!-- //section4 -->

      <section id="section5" class="parallax__item">
        <span class="parallax__item__num">05</span>
        <figure class="parallax__item__imgWrap">
          <div class="parallax__item__img img5"></div>
        </figure>
      </section>
      <!-- //section5 -->

      <section id="section6" class="parallax__item">
        <span class="parallax__item__num">06</span>
        <figure class="parallax__item__imgWrap">
          <div class="parallax__item__img img6"></div>
        </figure>
      </section>
      <!-- //section6 -->

      <section id="section7" class="parallax__item">
        <span class="parallax__item__num">07</span>
        <figure class="parallax__item__imgWrap">
          <div class="parallax__item__img"></div>
        </figure>
      </section>
      <!-- //section7 -->
    </main>
    <section id="section8" class="parallax__item">
      <span class="parallax__item__num">08</span>
      <figure class="parallax__item__imgWrap">
        <div class="parallax__item__img"></div>
      </figure>
    </section>
    <!-- //section8 -->

    <section id="section9" class="parallax__item">
      <span class="parallax__item__num">09</span>
      <figure class="parallax__item__imgWrap">
        <div class="parallax__item__img"></div>
      </figure>
    </section>
    <!-- //section9 -->
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <script src="https://cdn.jsdelivr.net/np
  m/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollToPlugin.min.js"></script>
  <script>
    const horizontal = document.querySelector("#horizontal");
    const sections = gsap.utils.toArray("#horizontal > section");

    //gsap.to메서드를 변수에 할당
    let scrollTween = gsap.to(sections, {
      xPercent: -100 * (sections.length - 1),
      ease: "none",
      scrollTrigger: {
        trigger: horizontal,//horizontal요소가 스크롤 트리거의 기준 요소로 설정
        start: "top top",
        //이 값은 horizontal요소의 넓이에서 뷰포트의 넓이를 뺀 값을 더한 거리입니다.
        end : () => "+=" + (horizontal.offsetWidth - window.innerWidth),
        pin:true,
        scrub: true,
        invalidateOnRefresh: true,//브라우저 창 크기 변경 등의 새로 고침시 애니메이션 설정이 다시 계산
      }
    })

    gsap.to(".img4", {
      y: -200,
      duration: 2,
      ease: "elastic", //탄력적으로 시작과 끝에서 약간의 스프링효과
      scrollTrigger: {
        trigger: ".img4",
        containerAnimation: scrollTween, //애니메이션이 포함된 스크롤 컨테이너의 애니메이션을 지정합니다
        start: "left center",//.img4 요소의 왼쪽 가장자리가 뷰포트의 수직 중앙에 도달할때 애니메이션 시작
        toggleActions: "play none reverse none",//애니메이션 시작될때 재생, 되돌아올때 애니메이션을 역으로 실행
        id: "img4", //스크롤 트리거에 식별자를 부여, 나중에 스크롤 트리거를 참조할때 유용
      }
    })
  </script>
</body>

</html>
